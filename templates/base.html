<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}{{ profile.name }} — {{ profile.title }}{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
{% block head %}{% endblock %}
</head>
<body>

<nav>
  <div class="nav-name">{{ profile.name }}</div>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#skills">Skills</a></li>
    <li><a href="#dashboards">Dashboards</a></li>
    <li><a href="#experience">Experience</a></li>
    <li><a href="#certifications">Credentials</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

{% block content %}{% endblock %}

<div class="footer">
  {{ profile.name | upper }} — {{ profile.title | upper }} — 2026
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
